name: Deploy 3D Web (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-3d
  cancel-in-progress: false

jobs:
  verify:
    name: Type-check & build (gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --fetch-retries=5 --fetch-retry-factor=2
      - name: Build (verify)
        run: npm run build
        env:
          VITE_IS_ELECTRON: 'false'
          VITE_BASE_WEB: /flight3Dviewer/
          VITE_BASE_ELECTRON: ./

  deploy:
    name: Build & FTP deploy
    needs: verify
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --fetch-retries=5 --fetch-retry-factor=2
      - name: Build React Web App
        run: npm run build
        env:
          VITE_IS_ELECTRON: 'false'
          VITE_BASE_WEB: /flight3Dviewer/
          VITE_BASE_ELECTRON: ./
      - name: Deploy React App via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: /hosting/developkmj/html/flight3Dviewer/
