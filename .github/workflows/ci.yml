name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-3d-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, type-check, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --fetch-retries=5 --fetch-retry-factor=2

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build (web)
        run: npm run build
        env:
          VITE_IS_ELECTRON: 'false'
          VITE_BASE_WEB: /flight3Dviewer/
          VITE_BASE_ELECTRON: ./
